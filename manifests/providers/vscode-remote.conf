DISPLAY_NAME="VS Code Remote-SSH style server layout"
ARTIFACT_MODE="dual"
REQUIRES_VERSION="false"
REQUIRES_COMMIT="true"
DEFAULT_INSTALL_ROOT="$HOME/.vscode-server"
PRIMARY_URL_TEMPLATE="https://update.code.visualstudio.com/commit:{commit}/cli-alpine-{arch}/{channel}"
SECONDARY_URL_TEMPLATE="https://update.code.visualstudio.com/commit:{commit}/server-{os}-{arch}/{channel}"
PRIMARY_PATH_TEMPLATE="{install_root}/code-{commit}"
SECONDARY_PATH_TEMPLATE="{install_root}/cli/servers/Stable-{commit}/server"
PRIMARY_CACHE_TEMPLATE="{install_root}/cache/vscode-remote/cli-{commit}-{arch}.tar.gz"
SECONDARY_CACHE_TEMPLATE="{install_root}/cache/vscode-remote/server-{commit}-{os}-{arch}.tar.gz"
PRIMARY_EXTRACT_MODE="rename_code_binary"
SECONDARY_EXTRACT_MODE="strip_to_dir"
ARCH_MAP_X64="x64"
ARCH_MAP_ARM64="arm64"
CURRENT_POINTER_TEMPLATE="{install_root}/cli/servers/Stable-current"
LIST_GLOB="{install_root}/cli/servers/Stable-*"
POST_INSTALL_HINT_TEMPLATE="{install_root}/code-{commit} --version"
