DISPLAY_NAME="OpenVSCode Server standalone tarball"
ARTIFACT_MODE="single"
REQUIRES_VERSION="true"
REQUIRES_COMMIT="false"
DEFAULT_INSTALL_ROOT="$HOME/.local/share/editor-server-deploy"
PRIMARY_URL_TEMPLATE="https://github.com/gitpod-io/openvscode-server/releases/download/openvscode-server-v{version}/openvscode-server-v{version}-{os}-{provider_arch}.tar.gz"
SECONDARY_URL_TEMPLATE=""
PRIMARY_PATH_TEMPLATE="{install_root}/openvscode-server/openvscode-server-v{version}-{os}-{provider_arch}"
SECONDARY_PATH_TEMPLATE=""
PRIMARY_CACHE_TEMPLATE="{install_root}/cache/openvscode-server/openvscode-server-{version}-{provider_arch}.tar.gz"
SECONDARY_CACHE_TEMPLATE=""
PRIMARY_EXTRACT_MODE="strip_to_dir"
SECONDARY_EXTRACT_MODE=""
ARCH_MAP_X64="x64"
ARCH_MAP_ARM64="arm64"
CURRENT_POINTER_TEMPLATE=""
LIST_GLOB="{install_root}/openvscode-server/*"
POST_INSTALL_HINT_TEMPLATE="{install_root}/openvscode-server/openvscode-server-v{version}-{os}-{provider_arch}/bin/openvscode-server --host 0.0.0.0 --port 3000"
