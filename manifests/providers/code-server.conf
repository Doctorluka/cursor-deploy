DISPLAY_NAME="coder/code-server standalone tarball"
ARTIFACT_MODE="single"
REQUIRES_VERSION="true"
REQUIRES_COMMIT="false"
DEFAULT_INSTALL_ROOT="$HOME/.local/share/editor-server-deploy"
PRIMARY_URL_TEMPLATE="https://github.com/coder/code-server/releases/download/v{version}/code-server-{version}-{os}-{provider_arch}.tar.gz"
SECONDARY_URL_TEMPLATE=""
PRIMARY_PATH_TEMPLATE="{install_root}/code-server/code-server-{version}-{os}-{provider_arch}"
SECONDARY_PATH_TEMPLATE=""
PRIMARY_CACHE_TEMPLATE="{install_root}/cache/code-server/code-server-{version}-{provider_arch}.tar.gz"
SECONDARY_CACHE_TEMPLATE=""
PRIMARY_EXTRACT_MODE="strip_to_dir"
SECONDARY_EXTRACT_MODE=""
ARCH_MAP_X64="amd64"
ARCH_MAP_ARM64="arm64"
CURRENT_POINTER_TEMPLATE=""
LIST_GLOB="{install_root}/code-server/*"
POST_INSTALL_HINT_TEMPLATE="{install_root}/code-server/code-server-{version}-{os}-{provider_arch}/bin/code-server --bind-addr 0.0.0.0:8080"
